name: Push Engine

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de execução"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - scheduled
          - reminder
          - soon
          - results
      message:
        description: "Mensagem do teste (opcional)"
        required: false
        default: ""
  schedule:
    # UTC. No verão em Portugal, Lisboa está UTC+1.
    # Terça/sexta = EuroMilhões. Quarta/sábado = Totoloto.
    # Scheduler inteligente. Corre em janelas úteis para lembretes e resultados.
    # Em modo scheduled, o script decide se deve enviar algo ou ficar idle.
    - cron: "*/30 17-23 * * 2,3,5,6"

jobs:
  push-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Push Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_MODE: ${{ github.event.inputs.mode || 'scheduled' }}
          PUSH_FORCE_TEST: ${{ github.event.inputs.mode == 'test' && '1' || '0' }}
          PUSH_TEST_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          PUSH_TEST_MESSAGE: ${{ github.event.inputs.message }}
        run: npm run push:engine
