name: Push Engine FCM

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de execução"
        required: true
        default: "test"
        type: choice
        options: [test, scheduled, reminder, soon, results]
      message:
        description: "Mensagem do teste (opcional)"
        required: false
        default: ""
  schedule:
    # Portugal: janelas de lembretes e resultados.
    - cron: "*/30 17-23 * * 2,3,5,6"

permissions:
  contents: read

concurrency:
  group: push-engine-fcm
  cancel-in-progress: false

jobs:
  push-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Push Engine FCM
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PUSH_MODE: ${{ github.event.inputs.mode || 'scheduled' }}
          PUSH_FORCE_TEST: ${{ github.event.inputs.mode == 'test' && '1' || '0' }}
          PUSH_TEST_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          PUSH_TEST_MESSAGE: ${{ github.event.inputs.message }}
        run: npm run push:engine
