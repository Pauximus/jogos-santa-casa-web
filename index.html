<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificador Jogos Santa Casa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🍀</div>
      <div class="brand-text">JOGOS<br><span>SANTA CASA</span></div>
    </div>
    <h1>Verificador de Resultados</h1>
  </header>

  <main class="app">
    <nav class="tabs" id="tabs"></nav>

    <section class="panel">
      <div class="row">
        <label>Jogo:</label>
        <select id="jogo"></select>
        <span class="hint">Atualiza automaticamente.</span>
      </div>

      <div class="form-area">
        <div id="campos"></div>
        <button id="adicionar">Adicionar aposta</button>
      </div>

      <h3>Apostas guardadas:</h3>
      <ul id="lista-apostas" class="bet-list"></ul>
    </section>

    <section class="results">
      <h2>Resultados:</h2>
      <div id="resultado" class="result-box"></div>
    </section>

    <section class="results">
      <div class="history-head">
        <h2>Histórico:</h2>
        <div>
          <button id="exportarHistorico">Exportar histórico</button>
          <button id="limparHistorico">Limpar histórico</button>
        </div>
      </div>
      <div id="historico" class="result-box historico-box"></div>
    </section>
  </main>

  <footer id="estado">Pronto.</footer>
  <script src="app.js"></script>
</body>
</html>
