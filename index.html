<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificador Jogos Santa Casa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#ffffff">
  <style>
    .auth-panel { max-width: 620px; margin: 18px auto; }
    .auth-panel h2 { margin-top: 0; }
    .auth-grid { display: grid; grid-template-columns: 100px 1fr; gap: 10px; align-items: center; margin: 16px 0; }
    .auth-input { width: 100%; max-width: 360px; text-align: left; }
    .auth-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .user-panel { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    @media(max-width:760px){ .auth-grid { grid-template-columns: 1fr; } .user-panel { display: block; } .user-panel button { margin-top: 10px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🍀</div>
      <div class="brand-text">JOGOS<br><span>SANTA CASA</span></div>
    </div>
    <h1>Verificador de Resultados</h1>
  </header>

  <main class="app">
    <section id="authBox" class="panel auth-panel">
      <h2>Entrar</h2>
      <p>Inicia sessão para sincronizar apostas e histórico entre dispositivos.</p>
      <div class="auth-grid">
        <label>Email:</label>
        <input id="authEmail" class="auth-input" type="email" autocomplete="email" placeholder="email@exemplo.pt">
        <label>Password:</label>
        <input id="authPassword" class="auth-input" type="password" autocomplete="current-password" placeholder="Password">
      </div>
      <div class="auth-actions">
        <button id="loginBtn">Entrar</button>
        <button id="signupBtn">Criar conta</button>
      </div>
      <div id="authMsg" class="result-card warn" style="display:none;"></div>
    </section>

    <section id="userBox" class="panel user-panel" style="display:none;">
      <strong id="userInfo">Sessão iniciada</strong>
      <button id="logoutBtn">Terminar sessão</button>
    </section>

    <div id="appBox" style="display:none;">
      <nav class="tabs" id="tabs"></nav>

      <section class="panel">
        <div class="row">
          <label>Jogo:</label>
          <select id="jogo"></select>
          <span class="hint">Atualiza automaticamente.</span>
        </div>

        <div class="form-area">
          <div id="campos"></div>
          <button id="adicionar">Adicionar aposta</button>
          <button id="recarregarApostas">Recarregar apostas cloud</button>
        </div>

        <h3>Apostas guardadas:</h3>
        <ul id="lista-apostas" class="bet-list"></ul>
      </section>

      <section class="results">
        <h2>Resultados:</h2>
        <div id="resultado" class="result-box"></div>
      </section>

      <section class="results">
        <div class="history-head">
          <h2>Histórico:</h2>
          <div>
            <button id="recarregarHistorico">Recarregar histórico cloud</button>
            <button id="exportarHistorico">Exportar histórico</button>
            <button id="limparHistorico">Limpar histórico local</button>
          </div>
        </div>
        <div id="historico" class="result-box historico-box"></div>
      </section>
    </div>
  </main>

  <footer id="estado">Pronto.</footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
